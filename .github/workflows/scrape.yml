name: Lancers Scout — Daily Scrape

on:
  schedule:
    - cron: "0 0 * * *"   # 9:00 AM JST
    - cron: "0 9 * * *"   # 6:00 PM JST
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to commit results.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper and analyzer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python main.py \
            --pages 2 \
            --filter apply \
            --top 10 \
            --output results.json

      - name: Post to Slack
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python notify_slack.py results.json

      - name: Commit results
        run: |
          git config user.name "lancers-scout[bot]"
          git config user.email "bot@lancers-scout"
          git add results.json
          git diff --cached --quiet || git commit -m "chore: update results $(date +'%Y-%m-%d %H:%M JST')"
          git push
