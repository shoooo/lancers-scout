name: Lancers Scout Daily Scrape

on:
  schedule:
    - cron: "0 0 * * *"   # 9:00 AM JST
    - cron: "0 9 * * *"   # 6:00 PM JST
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt && python -m playwright install chromium --with-deps

      - name: Restore Lancers session
        env:
          LANCERS_SESSION: ${{ secrets.LANCERS_SESSION }}
        run: |
          if [ -n "$LANCERS_SESSION" ]; then
            echo "$LANCERS_SESSION" | base64 -d > .session.json
            echo "Session restored."
          fi

      - name: Run scraper and analyzer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANCERS_EMAIL: ${{ secrets.LANCERS_EMAIL }}
          LANCERS_PASSWORD: ${{ secrets.LANCERS_PASSWORD }}
        run: |
          python main.py \
            --pages 2 \
            --propose \
            --propose-top 5 \
            --output results.json

      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            python notify_slack.py results.json
          else
            echo "No Slack webhook configured, skipping."
          fi

      - name: Copy results to docs
        run: cp results.json docs/results.json

      - name: Commit results
        run: |
          git config user.name "lancers-scout[bot]"
          git config user.email "bot@lancers-scout"
          git add results.json docs/results.json
          git diff --cached --quiet || git commit -m "chore: update results $(date +'%Y-%m-%d %H:%M JST')"
          git push
