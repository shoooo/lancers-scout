name: Lancers Scout Daily Scrape

on:
  workflow_dispatch:       # manual trigger only (scraping runs locally via launchd)

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt && python -m playwright install chromium --with-deps

      - name: Run scraper and analyzer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          USE_PLAYWRIGHT: "1"
        run: |
          python main.py \
            --pages 2 \
            --propose \
            --propose-top 5 \
            --output results.json

      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            python notify_slack.py results.json
          else
            echo "No Slack webhook configured, skipping."
          fi

      - name: Copy results to docs
        run: cp results.json docs/results.json

      - name: Commit results
        run: |
          git config user.name "lancers-scout[bot]"
          git config user.email "bot@lancers-scout"
          git add results.json docs/results.json
          git diff --cached --quiet || git commit -m "chore: update results $(date +'%Y-%m-%d %H:%M JST')"
          git push
