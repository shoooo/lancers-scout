<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lancers Scout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", -apple-system, sans-serif;
      background: #f0f2f5;
      color: #111827;
      min-height: 100vh;
      font-size: 15px;
    }

    /* HEADER */
    header {
      background: #fff;
      border-bottom: 2px solid #e5e7eb;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }
    header h1 span { color: #4f46e5; }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #updated {
      font-size: 0.78rem;
      color: #6b7280;
    }

    .refresh-btn {
      font-size: 0.78rem;
      padding: 5px 14px;
      border-radius: 6px;
      border: 1.5px solid #d1d5db;
      background: #fff;
      color: #374151;
      cursor: pointer;
      font-weight: 600;
    }
    .refresh-btn:hover { border-color: #4f46e5; color: #4f46e5; }

    .stats { display: flex; gap: 8px; flex-wrap: wrap; }

    .stat {
      font-size: 0.82rem;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 999px;
    }
    .stat.apply { background: #dcfce7; color: #15803d; }
    .stat.maybe { background: #fef9c3; color: #92400e; }
    .stat.skip  { background: #fee2e2; color: #b91c1c; }

    /* TOOLBAR */
    .toolbar {
      padding: 14px 24px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      background: #f0f2f5;
    }

    .filter-btn {
      padding: 8px 20px;
      border-radius: 999px;
      border: 2px solid #d1d5db;
      background: #fff;
      color: #374151;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.12s;
    }
    .filter-btn:hover { border-color: #4f46e5; color: #4f46e5; }
    .filter-btn.active { background: #4f46e5; border-color: #4f46e5; color: #fff; }

    .count-label {
      font-size: 0.82rem;
      color: #6b7280;
      margin-left: auto;
      font-weight: 500;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 16px;
      padding: 4px 24px 48px;
    }

    /* CARD */
    .card {
      background: #fff;
      border-radius: 12px;
      border: 2px solid #e5e7eb;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .card:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    .card-stripe { height: 5px; }
    .apply .card-stripe { background: #22c55e; }
    .maybe .card-stripe { background: #f59e0b; }
    .skip  .card-stripe { background: #ef4444; }

    .card-body {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      flex: 1;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .score-badge {
      flex-shrink: 0;
      font-size: 0.72rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 999px;
      margin-top: 2px;
    }
    .apply .score-badge { background: #dcfce7; color: #15803d; }
    .maybe .score-badge { background: #fef9c3; color: #92400e; }
    .skip  .score-badge { background: #fee2e2; color: #b91c1c; }

    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.45;
      color: #111827;
    }

    .badge-new {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 800;
      background: #4f46e5;
      color: #fff;
      padding: 1px 7px;
      border-radius: 999px;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* META */
    .meta {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 5px 10px;
      font-size: 0.82rem;
    }
    .meta-label { color: #9ca3af; font-weight: 500; }
    .meta-value { color: #374151; font-weight: 600; }

    /* REASON */
    .reason {
      font-size: 0.82rem;
      color: #4b5563;
      line-height: 1.6;
      background: #f9fafb;
      border-radius: 8px;
      padding: 10px 12px;
      border-left: 4px solid #e5e7eb;
    }
    .apply .reason { border-left-color: #22c55e; }
    .maybe .reason { border-left-color: #f59e0b; }
    .skip  .reason { border-left-color: #ef4444; }

    /* PROPOSAL */
    .proposal-toggle {
      font-size: 0.82rem;
      color: #4f46e5;
      cursor: pointer;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 5px;
      user-select: none;
    }
    .proposal-toggle:hover { color: #3730a3; }

    .proposal-box { display: none; position: relative; }
    .proposal-box.open { display: block; }

    .proposal-text {
      font-size: 0.84rem;
      color: #1f2937;
      background: #f9fafb;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 14px 14px 42px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .copy-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 0.75rem;
      padding: 5px 14px;
      background: #4f46e5;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.12s;
    }
    .copy-btn:hover { background: #3730a3; }
    .copy-btn.copied { background: #22c55e; }

    /* APPLY BUTTON */
    .apply-btn {
      display: block;
      text-align: center;
      background: #4f46e5;
      color: #fff;
      text-decoration: none;
      padding: 11px;
      font-size: 0.88rem;
      font-weight: 700;
      transition: background 0.12s;
      letter-spacing: 0.01em;
    }
    .apply-btn:hover { background: #3730a3; }

    .message {
      grid-column: 1 / -1;
      text-align: center;
      color: #9ca3af;
      padding: 80px 24px;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Lancers <span>Scout</span></h1>
  <div class="stats" id="stats"></div>
  <div class="header-right">
    <span id="updated"></span>
    <button class="refresh-btn" onclick="load()">再読み込み</button>
  </div>
</header>

<div class="toolbar">
  <button class="filter-btn active" data-filter="all">すべて</button>
  <button class="filter-btn" data-filter="apply">応募推奨</button>
  <button class="filter-btn" data-filter="maybe">検討</button>
  <button class="filter-btn" data-filter="skip">スキップ</button>
  <span class="count-label" id="count-label"></span>
</div>

<div class="grid" id="grid">
  <div class="message">読み込み中...</div>
</div>

<script>
  let all = [];
  let filter = "all";

  async function load() {
    document.getElementById("grid").innerHTML = '<div class="message">読み込み中...</div>';
    try {
      const res = await fetch("results.json?t=" + Date.now());
      all = await res.json();
      render();
      renderStats();
      fetch("results.json", { method: "HEAD" }).then(r => {
        const lm = r.headers.get("last-modified");
        if (lm) {
          const d = new Date(lm);
          document.getElementById("updated").textContent =
            "最終更新: " + d.toLocaleDateString("ja-JP") + " " + d.toLocaleTimeString("ja-JP", {hour:"2-digit", minute:"2-digit"});
        }
      }).catch(() => {});
    } catch {
      document.getElementById("grid").innerHTML =
        '<div class="message">results.json が見つかりません。<br>スクレイパーを実行してください。</div>';
    }
  }

  function renderStats() {
    const apply = all.filter(p => p.recommendation === "apply").length;
    const maybe = all.filter(p => p.recommendation === "maybe").length;
    const skip  = all.filter(p => p.recommendation === "skip").length;
    document.getElementById("stats").innerHTML =
      `<span class="stat apply">応募推奨 ${apply}件</span>` +
      `<span class="stat maybe">検討 ${maybe}件</span>` +
      `<span class="stat skip">スキップ ${skip}件</span>`;
  }

  function render() {
    const filtered = filter === "all" ? all : all.filter(p => p.recommendation === filter);
    document.getElementById("count-label").textContent = filtered.length + "件表示中";
    const grid = document.getElementById("grid");

    if (!filtered.length) {
      grid.innerHTML = '<div class="message">該当する案件がありません</div>';
      return;
    }

    grid.innerHTML = filtered.map(p => {
      const hasProposal = p.proposal && p.proposal.trim();
      const recLabel = { apply: "応募推奨", maybe: "検討", skip: "スキップ" }[p.recommendation] || p.recommendation;
      return `
        <div class="card ${p.recommendation}">
          <div class="card-stripe"></div>
          <div class="card-body">
            <div class="card-top">
              <span class="score-badge">${p.score}/10</span>
              <div class="card-title">
                ${p.is_new ? '<span class="badge-new">NEW</span>' : ""}
                ${esc(p.title)}
              </div>
            </div>

            <div class="meta">
              <span class="meta-label">予算</span>
              <span class="meta-value">${esc(p.budget)}</span>
              <span class="meta-label">カテゴリ</span>
              <span class="meta-value">${esc(p.category)}</span>
              <span class="meta-label">提案数</span>
              <span class="meta-value">${esc(p.proposal_count)}</span>
              <span class="meta-label">キーワード</span>
              <span class="meta-value">${esc(p.keyword)}</span>
            </div>

            <div class="reason">${esc(p.reason)}</div>

            ${p.apply_tip ? `<div class="reason" style="border-left-color:#818cf8;background:#eef2ff;color:#3730a3">💡 ${esc(p.apply_tip)}</div>` : ""}

            ${hasProposal ? `
              <div class="proposal-toggle" onclick="toggle(this)">
                <span class="arrow">▶</span> 提案文を見る
              </div>
              <div class="proposal-box">
                <div class="proposal-text">${esc(p.proposal)}</div>
                <button class="copy-btn" onclick="copy(this)">コピー</button>
              </div>
            ` : ""}
          </div>
          <a class="apply-btn" href="${esc(p.url)}" target="_blank" rel="noopener">
            Lancers で開く →
          </a>
        </div>`;
    }).join("");
  }

  function toggle(el) {
    const box = el.nextElementSibling;
    const open = box.classList.toggle("open");
    el.querySelector(".arrow").textContent = open ? "▼" : "▶";
    el.childNodes[1].textContent = open ? " 提案文を閉じる" : " 提案文を見る";
  }

  function copy(btn) {
    const text = btn.previousElementSibling.textContent.trim();
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = "コピー済 ✓";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "コピー"; btn.classList.remove("copied"); }, 2000);
    });
  }

  function esc(s) {
    return String(s || "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      filter = btn.dataset.filter;
      render();
    });
  });

  load();
</script>
</body>
</html>
